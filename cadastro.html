                <button class="button_blue_header"><a href=""><strong>Mini Cursos</strong></a></button>
            </div>
        </nav>
    </header>
    <form action="" method="post" autocomplete="on">
        <fieldset>
            <legend><h4>Vamos fazer o seu cadastro!</h4></legend>
            <div><label for="nome">Nome:</label>
                <input type="text" name="Nome" id="nome" required placeholder="Nome Completo" autocomplete="nome"></div>
            <div><label for="email">E-mail:</label>
                <input type="email" name="email" id="email" autocomplete="email" required></div>
            <div><label for="Endereço">Endereço:</label>
                <input type="text" name="Endereço" id="Endereço" required></div>
            <div><label for="tel">Telefone:</label>
                <input type="tel" name="tel" id="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" placeholder="(xx)xxxxx-xxxx"></div>
            <div><label for="Area">Area de atuação:</label>
                <input type="text" name="Area" id="Area" required></div>
            <div><label for="crm">crm:</label>
                <input type="number" name="crm" id="crm" required></div>
            <div><label for="arquivo">Declaração de matrícula:</label> 
                <input type="file" name="arquivo" id="arquivo" placeholder="Arquivo PDF/PNG" required accept="image/png, application/pdf"></div>
            <div><label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" required minlength="8" placeholder="Mínimo de 8 catacteres"></div>
            <div><label for="isenha">Confirme sua senha:</label>
                <input type="password" name="senha" id="isenha" required minlength="8" placeholder="Mínimo de 8 caracteres"></div>
        </fieldset>
        <div><input type="submit" value="Cadastrar agora"></div>
    </form>
