<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Mãe</title>
</head>
<body>
    <header>
        <div>
            <img src="./img/logo_to_gravida.png" class="logo_to_gravida">
        </div>
        <nav class="nav_header">
            <div>
                <button class="button_blue"><a href="./cadastro_profissional.html" ><strong>É um Profissional? Cadastre-se aqui!</strong></a></button>
                <button class="button_blue"><a href="./login.html"><strong>Login / Cadastre-se</strong></a></button>
            </div>
            <br>
            <div>
                <button class="button_blue_header"><a href="Seu_acompanhamento_gravida.html"><strong>Seu acompanhamento</strong></a></button>
                <button class="button_blue_header"><a href="Seu_acompanhamento_planejamento.html"><strong>Planejando a sua gravidez</strong></a></button>
                <button class="button_blue_header"><a href=""><strong>Nossa comunidade</strong></a></button>
                <button class="button_blue_header"><a href=""><strong>Dicas e Informações</strong></a></button>
                <button class="button_blue_header"><a href=""><strong>Central de Apoio</strong></a></button>
                <button class="button_blue_header"><a href=""><strong>Mini Cursos</strong></a></button>
            </div>
        </nav>
    </header>
    <form action="" autocomplete="on" method="post">
        <p><h3>Cadastro da Mamãe!</h3></p>
        <fieldset>
            <legend><h4>Vamos fazer o seu cadastro!</h4></legend>
            <div><label for="nome">Nome: </label>
            <input type="text" name="nome" id="nome" autocomplete="on" placeholder="Nome Completo" required></div>
            <div><label for="email">E-mail: </label>
            <input type="email" name="email" id="email" required></div>
            <div><label for="texto">Você está grávida? (Sim/Não) </label>
            <input type="text" name="texto" id="texto" placeholder="Digite Sim ou Não" required></div>
            <div><label for="data">DPP: </label>
            <input type="date" name="data" id="data" required></div>
            <div><label for="senha">Senha: </label>
            <input type="password" name="senha" id="senha" placeholder="Mínimo de 8 caracteres" required></div>
            <div><label for="isenha">Confirmar Senha: </label>
            <input type="password" name="senha" id="isenha" placeholder="Mínimo de 8 caracteres" required></div>
        </fieldset>
        <input type="checkbox" name="li" id="li" required>
        <label for="li">Li e concordo com a Política de Privacidade e Termos de Uso do Tô Grávida.</label>
        <div><input type="submit" value="Cadastrar agora"></div>
    </form>
    <footer>
        <div>
            <h2 class="titulo_blue">Acesse nossas redes sociais</h2>
            <h2 class="titulo_footer">Sobre o Tô Grávida</h2>
        </div>
            <nav>
                <a href="http://www.facebook.com"><img src="./img/logo_facebook.png" class="logo_redes_sociais"></a>
                <a href="http://www.instagram.com"><img src="./img/logo_instagram.png" class="logo_redes_sociais"></a>
                <a href="http://www.youtube.com/"><img src="./img/logo_youtube.png" class="logo_redes_sociais"></a>
                <a href="Quem_somos.html">Quem somos</a>
                <a href="Politica_privacidade_termos_uso.html">Política de Privacidade / Termos de Uso</a>
                <a href="Dúvidas_fale_conosco.html">Dúvidas / Fale Conosco</a>
            </nav>
    </footer>
</body>
</html>
